<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPAS ARP Tool</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
  --bg:    #0f172a;
  --card:  #1e293b;
  --border:#334155;
  --muted: #94a3b8;
  --text:  #e2e8f0;
  --blue:  #3b82f6;
  --green: #22c55e;
  --red:   #ef4444;
  --amber: #f59e0b;
  --log-bg:#020817;
}
* { box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

/* Navbar */
.navbar { background: var(--card) !important; border-bottom: 1px solid var(--border); }
.brand  { font-weight: 700; font-size: 1.1rem; letter-spacing: -.3px; }

/* Status dot */
.sdot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.s-idle     { background: var(--muted); }
.s-running  { background: var(--green); box-shadow: 0 0 7px var(--green); animation: blink 1.4s infinite; }
.s-stopping { background: var(--amber); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* Tabs */
.nav-tabs { border-bottom: 1px solid var(--border); }
.nav-tabs .nav-link { color: var(--muted); border: none; border-bottom: 2px solid transparent; padding: .65rem 1.2rem; }
.nav-tabs .nav-link:hover { color: var(--text); }
.nav-tabs .nav-link.active { color: var(--blue); border-bottom-color: var(--blue); background: transparent; }

/* Cards */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; }
.card-header { background: transparent; border-bottom: 1px solid var(--border); font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }

/* Form */
.form-control, .form-select { background: var(--bg); border-color: var(--border); color: var(--text); font-size: .88rem; }
.form-control:focus, .form-select:focus { background: var(--bg); border-color: var(--blue); color: var(--text); box-shadow: 0 0 0 .2rem rgba(59,130,246,.2); }
.form-control::placeholder { color: var(--muted); }
.form-label { color: var(--muted); font-size: .8rem; margin-bottom: .25rem; }

/* Table */
.table { color: var(--text); }
.table thead th { color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; border-color: var(--border); font-weight: 600; }
.table td { border-color: var(--border); vertical-align: middle; }
.table tbody tr:hover td { background: rgba(255,255,255,.025); }

/* Badges */
.b-legal   { background: rgba(34,197,94,.12);  color: var(--green); border: 1px solid rgba(34,197,94,.3);  border-radius: 99px; padding: 2px 9px; font-size: .75rem; }
.b-illegal { background: rgba(239,68,68,.12);  color: var(--red);   border: 1px solid rgba(239,68,68,.3);  border-radius: 99px; padding: 2px 9px; font-size: .75rem; }

/* Mono */
.mono { font-family: 'Consolas', 'Courier New', monospace; font-size: .85em; }

/* Log */
#logArea {
  background: var(--log-bg); border: 1px solid var(--border); border-radius: 8px;
  font-family: 'Consolas', 'Courier New', monospace; font-size: .8rem;
  padding: 1rem; height: 420px; overflow-y: auto; color: #86efac;
}
.l-start   { color: #67e8f9; }
.l-poison  { color: var(--amber); }
.l-block   { color: #f97316; }
.l-restore { color: var(--blue); }
.l-error   { color: var(--red); }
.l-ping    { display: none; }

/* Empty state */
.empty { text-align: center; color: var(--muted); padding: 2.2rem 1rem; font-size: .88rem; }
.empty i { font-size: 1.8rem; display: block; margin-bottom: .5rem; opacity: .5; }

/* Buttons */
.btn-primary { background: var(--blue); border-color: var(--blue); }
.btn-primary:hover { background: #2563eb; border-color: #2563eb; }
</style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────── -->
<nav class="navbar px-4 py-2 d-flex align-items-center gap-3">
  <span class="brand text-white"><i class="bi bi-shield-lock-fill text-primary me-2"></i>UPAS ARP Tool</span>
  <div class="d-flex align-items-center gap-2 ms-2">
    <span class="sdot s-idle" id="sDot"></span>
    <span style="color:var(--muted);font-size:.85rem" id="sText">閒置</span>
  </div>
</nav>

<!-- ── Main ───────────────────────────────────────────────────────── -->
<div class="container-fluid px-4 py-3">

  <!-- Tabs -->
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><a class="nav-link active" data-tab="scan"      href="#"><i class="bi bi-radar me-1"></i>掃描偵測</a></li>
    <li class="nav-item"><a class="nav-link"        data-tab="whitelist" href="#"><i class="bi bi-list-check me-1"></i>白名單管理</a></li>
    <li class="nav-item"><a class="nav-link"        data-tab="enforce"   href="#"><i class="bi bi-ban me-1"></i>封鎖執行</a></li>
  </ul>

  <!-- ════════════ TAB: SCAN ════════════ -->
  <div id="tab-scan">
    <div class="row g-3">

      <!-- Settings -->
      <div class="col-md-3">
        <div class="card">
          <div class="card-header p-2 px-3"><i class="bi bi-gear me-1"></i>掃描設定</div>
          <div class="card-body p-3">
            <div class="mb-2">
              <label class="form-label">網卡介面</label>
              <input class="form-control form-control-sm" id="iface" value="ens18">
            </div>
            <div class="mb-3">
              <label class="form-label">網段</label>
              <input class="form-control form-control-sm" id="subnet" value="192.168.88.0/24">
            </div>
            <div class="d-grid">
              <button class="btn btn-primary btn-sm" id="btnScan">
                <i class="bi bi-search me-1" id="scanIcon"></i>
                <span class="spinner-border spinner-border-sm d-none me-1" id="scanSpin"></span>
                <span id="scanLabel">開始掃描</span>
              </button>
            </div>
            <div class="mt-2 small" style="color:var(--muted)" id="scanSummary"></div>
            <hr style="border-color:var(--border);margin:.75rem 0">
            <label class="form-label">自動掃描間隔（秒）</label>
            <input class="form-control form-control-sm mb-2" id="autoInterval" type="number" value="60" min="10">
            <div class="d-grid gap-1">
              <button class="btn btn-sm" id="btnAutoStart"
                style="color:var(--blue);border:1px solid var(--blue)">
                <i class="bi bi-arrow-repeat me-1"></i>開啟自動掃描
              </button>
              <button class="btn btn-sm" id="btnAutoStop" style="display:none;color:var(--amber);border:1px solid var(--amber)">
                <i class="bi bi-stop-circle me-1"></i>停止自動掃描
              </button>
            </div>
            <div class="mt-2 small" id="autoStatus" style="color:var(--muted)"></div>
          </div>
        </div>
      </div>

      <!-- Device list -->
      <div class="col-md-9">
        <div class="card">
          <div class="card-header p-2 px-3 d-flex justify-content-between align-items-center">
            <span><i class="bi bi-hdd-network me-1"></i>設備列表</span>
            <span class="badge bg-secondary" id="devCount"></span>
          </div>
          <div class="card-body p-0">
            <div id="devEmpty" class="empty"><i class="bi bi-search"></i>點擊「開始掃描」探索網段設備</div>
            <table class="table table-sm mb-0" id="devTable" style="display:none">
              <thead><tr>
                <th class="ps-3">IP 位址</th><th>MAC 位址</th><th>狀態</th><th class="pe-3 text-end">操作</th>
              </tr></thead>
              <tbody id="devBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ════════════ TAB: WHITELIST ════════════ -->
  <div id="tab-whitelist" style="display:none">
    <div class="row g-3">

      <!-- Add form -->
      <div class="col-md-4">
        <div class="card">
          <div class="card-header p-2 px-3"><i class="bi bi-plus-circle me-1"></i>新增白名單</div>
          <div class="card-body p-3">
            <div class="mb-2">
              <label class="form-label">IP 位址</label>
              <input class="form-control form-control-sm" id="wlIp" placeholder="192.168.88.x">
            </div>
            <div class="mb-2">
              <label class="form-label">MAC 位址</label>
              <input class="form-control form-control-sm" id="wlMac" placeholder="AA:BB:CC:DD:EE:FF">
            </div>
            <div class="mb-3">
              <label class="form-label">備註 <span style="color:var(--muted)">(選填)</span></label>
              <input class="form-control form-control-sm" id="wlNote" placeholder="例：My laptop">
            </div>
            <div class="d-grid">
              <button class="btn btn-primary btn-sm" id="btnAddWl"><i class="bi bi-plus me-1"></i>新增</button>
            </div>
            <div class="mt-2 small" style="color:var(--muted)">也可在掃描頁直接點「加入白名單」</div>
          </div>
        </div>
      </div>

      <!-- Whitelist entries -->
      <div class="col-md-8">
        <div class="card">
          <div class="card-header p-2 px-3 d-flex justify-content-between align-items-center">
            <span><i class="bi bi-shield-check me-1"></i>白名單設備</span>
            <span class="badge bg-secondary" id="wlCount"></span>
          </div>
          <div class="card-body p-0">
            <div id="wlEmpty" class="empty"><i class="bi bi-shield-exclamation"></i>白名單為空，所有設備將被封鎖</div>
            <table class="table table-sm mb-0" id="wlTable" style="display:none">
              <thead><tr>
                <th class="ps-3">IP 位址</th><th>MAC 位址</th><th>備註</th><th class="pe-3 text-end">操作</th>
              </tr></thead>
              <tbody id="wlBody"></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ════════════ TAB: ENFORCE ════════════ -->
  <div id="tab-enforce" style="display:none">
    <div class="row g-3">

      <!-- Controls -->
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-header p-2 px-3"><i class="bi bi-shield-fill-x me-1"></i>封鎖設定</div>
          <div class="card-body p-3">
            <div class="mb-2">
              <label class="form-label">Gateway IP</label>
              <input class="form-control form-control-sm" id="gwIp" value="192.168.88.1">
            </div>
            <div class="mb-2">
              <label class="form-label">網卡介面</label>
              <input class="form-control form-control-sm" id="enfIface" value="ens18">
            </div>
            <div class="mb-3">
              <label class="form-label">刷新間隔（秒）</label>
              <input class="form-control form-control-sm" id="interval" type="number" value="15" min="3">
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-danger btn-sm" id="btnStart"><i class="bi bi-play-fill me-1"></i>開始封鎖</button>
              <button class="btn btn-secondary btn-sm" id="btnStop" disabled><i class="bi bi-stop-fill me-1"></i>停止封鎖</button>
            </div>
          </div>
        </div>

        <!-- Illegal preview -->
        <div class="card">
          <div class="card-header p-2 px-3"><i class="bi bi-exclamation-triangle me-1"></i>封鎖目標</div>
          <div id="illegalBox">
            <div class="empty small py-3"><i class="bi bi-arrow-left-circle" style="font-size:1.1rem"></i>先掃描並設定白名單</div>
          </div>
        </div>
      </div>

      <!-- Log -->
      <div class="col-md-9">
        <div class="card">
          <div class="card-header p-2 px-3 d-flex justify-content-between align-items-center">
            <span><i class="bi bi-terminal me-1"></i>即時 Log</span>
            <button class="btn btn-sm py-0" style="color:var(--muted);border:1px solid var(--border)" id="btnClear">清除</button>
          </div>
          <div class="p-2">
            <div id="logArea"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let scanDevices = [];
let enforceStatus = 'idle';
let logAutoScroll = true;

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    document.querySelectorAll('[data-tab]').forEach(l => l.classList.remove('active'));
    link.classList.add('active');
    ['scan','whitelist','enforce'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === link.dataset.tab ? '' : 'none';
    });
    if (link.dataset.tab === 'whitelist') loadWhitelist();
    if (link.dataset.tab === 'enforce')   refreshEnforceStatus();
  });
});

// sync interface field across tabs
document.getElementById('iface').addEventListener('input', function() {
  document.getElementById('enfIface').value = this.value;
});

// ── Scan ───────────────────────────────────────────────────────────────────
document.getElementById('btnScan').addEventListener('click', async () => {
  setScanLoading(true);
  try {
    const res = await fetch('/api/scan', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ interface: document.getElementById('iface').value.trim(),
                             subnet:    document.getElementById('subnet').value.trim() })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    scanDevices = data.devices;
    renderDevices(scanDevices);
    document.getElementById('scanSummary').textContent = `發現 ${data.devices.length} 台設備`;
    refreshEnforceStatus();
  } catch(e) {
    alert('掃描失敗: ' + e.message);
  } finally {
    setScanLoading(false);
  }
});

function setScanLoading(on) {
  document.getElementById('btnScan').disabled = on;
  document.getElementById('scanIcon').classList.toggle('d-none', on);
  document.getElementById('scanSpin').classList.toggle('d-none', !on);
  document.getElementById('scanLabel').textContent = on ? '掃描中...' : '開始掃描';
}

function renderDevices(devices) {
  const empty = document.getElementById('devEmpty');
  const table = document.getElementById('devTable');
  const tbody = document.getElementById('devBody');
  document.getElementById('devCount').textContent = devices.length + ' 台';

  if (!devices.length) { empty.style.display=''; table.style.display='none'; return; }
  empty.style.display = 'none'; table.style.display = '';

  tbody.innerHTML = devices.map(d => `
    <tr>
      <td class="ps-3 mono">${d.ip}</td>
      <td class="mono" style="color:var(--muted)">${d.mac}</td>
      <td>${d.whitelisted
        ? '<span class="b-legal"><i class="bi bi-check-circle-fill me-1"></i>白名單</span>'
        : '<span class="b-illegal"><i class="bi bi-x-circle-fill me-1"></i>非法</span>'}</td>
      <td class="pe-3 text-end">
        ${d.whitelisted
          ? `<button class="btn btn-sm py-0 px-2" style="color:var(--red);border:1px solid var(--border)" onclick="removeWl('${d.mac}')"><i class="bi bi-x"></i> 移除</button>`
          : `<button class="btn btn-sm py-0 px-2" style="color:var(--green);border:1px solid var(--border)" onclick="quickAdd('${d.ip}','${d.mac}')"><i class="bi bi-plus"></i> 加入白名單</button>`
        }
      </td>
    </tr>`).join('');
}

async function quickAdd(ip, mac) {
  const note = prompt(`為 ${ip} 新增備註（可留空）:`, '');
  if (note === null) return;
  await fetch('/api/whitelist', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ip, mac, note}) });
  await refreshAfterWlChange();
}

// ── Whitelist ──────────────────────────────────────────────────────────────
async function loadWhitelist() {
  const wl = await (await fetch('/api/whitelist')).json();
  renderWhitelist(wl);
  return wl;
}

function renderWhitelist(entries) {
  const empty = document.getElementById('wlEmpty');
  const table = document.getElementById('wlTable');
  const tbody = document.getElementById('wlBody');
  document.getElementById('wlCount').textContent = entries.length + ' 筆';

  if (!entries.length) { empty.style.display=''; table.style.display='none'; return; }
  empty.style.display = 'none'; table.style.display = '';

  tbody.innerHTML = entries.map(e => `
    <tr>
      <td class="ps-3 mono">${e.ip}</td>
      <td class="mono" style="color:var(--muted)">${e.mac}</td>
      <td class="small" style="color:var(--muted)">${e.note||'—'}</td>
      <td class="pe-3 text-end">
        <button class="btn btn-sm py-0 px-2" style="color:var(--red);border:1px solid var(--border)" onclick="removeWl('${e.mac}')">
          <i class="bi bi-trash"></i>
        </button>
      </td>
    </tr>`).join('');
}

async function removeWl(mac) {
  if (!confirm(`將 ${mac} 從白名單移除？`)) return;
  await fetch(`/api/whitelist/${encodeURIComponent(mac)}`, { method:'DELETE' });
  await refreshAfterWlChange();
}

document.getElementById('btnAddWl').addEventListener('click', async () => {
  const ip   = document.getElementById('wlIp').value.trim();
  const mac  = document.getElementById('wlMac').value.trim();
  const note = document.getElementById('wlNote').value.trim();
  if (!ip || !mac) { alert('IP 和 MAC 為必填'); return; }
  const res = await fetch('/api/whitelist', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ip, mac, note}) });
  const data = await res.json();
  if (!data.ok) { alert('新增失敗: ' + data.error); return; }
  document.getElementById('wlIp').value = '';
  document.getElementById('wlMac').value = '';
  document.getElementById('wlNote').value = '';
  await refreshAfterWlChange();
});

async function refreshAfterWlChange() {
  const wl = await loadWhitelist();
  const wlMacs = new Set(wl.map(e => e.mac.toUpperCase()));
  scanDevices.forEach(d => { d.whitelisted = wlMacs.has(d.mac.toUpperCase()); });
  renderDevices(scanDevices);
  refreshEnforceStatus();
}

// ── Enforce ────────────────────────────────────────────────────────────────
async function refreshEnforceStatus() {
  const data = await (await fetch('/api/enforce/status')).json();
  enforceStatus = data.status;
  updateStatusBadge(data.status);
  updateEnforceButtons(data.status);
  renderIllegalBox(data.illegal || []);
}

function updateStatusBadge(s) {
  document.getElementById('sDot').className  = `sdot s-${s}`;
  document.getElementById('sText').textContent = {idle:'閒置', running:'封鎖中', stopping:'停止中'}[s] || s;
}

function updateEnforceButtons(s) {
  document.getElementById('btnStart').disabled = s !== 'idle';
  document.getElementById('btnStop').disabled  = s !== 'running';
}

function renderIllegalBox(illegal) {
  const box = document.getElementById('illegalBox');
  if (!illegal.length) {
    box.innerHTML = '<div class="empty small py-3"><i class="bi bi-check-circle" style="font-size:1.1rem;color:var(--green)"></i>沒有需封鎖的設備</div>';
    return;
  }
  box.innerHTML = `
    <div class="px-1 pb-1 pt-1">
      ${illegal.map(d => `
        <div class="d-flex justify-content-between align-items-center px-2 py-1" style="border-bottom:1px solid var(--border)">
          <span class="mono small">${d.ip}</span>
          <span class="mono" style="font-size:.7rem;color:var(--muted)">${d.mac}</span>
        </div>`).join('')}
      <div class="px-2 pt-2 pb-1 small" style="color:var(--muted)">${illegal.length} 台設備將被封鎖</div>
    </div>`;
}

document.getElementById('btnStart').addEventListener('click', async () => {
  const gw  = document.getElementById('gwIp').value.trim();
  const ifc = document.getElementById('enfIface').value.trim();
  const ivl = parseInt(document.getElementById('interval').value) || 30;
  if (!gw) { alert('請輸入 Gateway IP'); return; }
  const res  = await fetch('/api/enforce/start', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({gateway: gw, interface: ifc, interval: ivl}) });
  const data = await res.json();
  if (!data.ok) { alert('啟動失敗: ' + data.error); return; }
  refreshEnforceStatus();
});

document.getElementById('btnStop').addEventListener('click', async () => {
  const res  = await fetch('/api/enforce/stop', { method:'POST' });
  const data = await res.json();
  if (!data.ok) { alert('停止失敗: ' + data.error); return; }
  refreshEnforceStatus();
});

// ── Log stream ─────────────────────────────────────────────────────────────
function logClass(msg) {
  const m = msg.toLowerCase();
  if (m.includes(':ping'))      return 'l-ping';
  if (m.includes('enforce start')) return 'l-start';
  if (m.includes('poisoned'))   return 'l-poison';
  if (m.includes('block:'))     return 'l-block';
  if (m.includes('restore') || m.includes('recover')) return 'l-restore';
  if (m.includes('error') || m.includes('fail'))      return 'l-error';
  return '';
}

function appendLog(msg) {
  const area = document.getElementById('logArea');
  const div  = document.createElement('div');
  div.className = logClass(msg);
  div.textContent = msg;
  area.appendChild(div);
  if (logAutoScroll) area.scrollTop = area.scrollHeight;
}

function connectLogStream() {
  const es = new EventSource('/api/logs/stream');
  es.onmessage = e => {
    appendLog(e.data);
    if (e.data.includes('ENFORCE') || e.data.includes('restored') || e.data.includes('idle'))
      refreshEnforceStatus();
  };
  es.onerror = () => { es.close(); setTimeout(connectLogStream, 3000); };
}

document.getElementById('logArea').addEventListener('scroll', function() {
  logAutoScroll = this.scrollTop + this.clientHeight >= this.scrollHeight - 30;
});
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('logArea').innerHTML = '';
});

// ── Auto-scan ─────────────────────────────────────────────────────────────────
let lastScanVersion = 0;

document.getElementById('btnAutoStart').addEventListener('click', async () => {
  const interval = parseInt(document.getElementById('autoInterval').value) || 60;
  const res = await fetch('/api/autoscan/start', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      interface: document.getElementById('iface').value.trim(),
      subnet:    document.getElementById('subnet').value.trim(),
      interval
    })
  });
  const data = await res.json();
  if (!data.ok) { alert('啟動失敗: ' + data.error); return; }
  setAutoScanUI('running');
});

document.getElementById('btnAutoStop').addEventListener('click', async () => {
  await fetch('/api/autoscan/stop', { method: 'POST' });
  setAutoScanUI('idle');
});

function setAutoScanUI(status) {
  document.getElementById('btnAutoStart').style.display = status === 'running' ? 'none' : '';
  document.getElementById('btnAutoStop').style.display  = status === 'running' ? '' : 'none';
}

async function pollAutoScan() {
  try {
    const res  = await fetch('/api/autoscan/status');
    const data = await res.json();
    setAutoScanUI(data.status);
    const el = document.getElementById('autoStatus');
    if (data.status === 'running') {
      el.textContent = data.last ? `上次掃描：${data.last}` : '等待第一次掃描…';
    } else {
      el.textContent = data.last ? `已停止 | 最後掃描：${data.last}` : '';
    }
    // If scan_version changed, refresh device table and enforce status
    if (data.version !== lastScanVersion) {
      lastScanVersion = data.version;
      const r2   = await fetch('/api/scan/results');
      const scan = await r2.json();
      scanDevices = scan.devices;
      renderDevices(scanDevices);
      document.getElementById('scanSummary').textContent = `發現 ${scan.devices.length} 台設備`;
      refreshEnforceStatus();
    }
  } catch(_) {}
}

// ── Periodic refresh ────────────────────────────────────────────────────────
setInterval(() => {
  if (enforceStatus === 'running' || enforceStatus === 'stopping') refreshEnforceStatus();
  pollAutoScan();
}, 4000);

// ── Init ────────────────────────────────────────────────────────────────────
connectLogStream();
refreshEnforceStatus();
loadWhitelist();
pollAutoScan();
</script>
</body>
</html>
